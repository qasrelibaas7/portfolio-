<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umer Takildar | Premium Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs"></div>
    
    <div class="container">
        <div class="glass-card profile-section">
            <div class="profile-img">UT</div>
            <h1>Umer Takildar</h1>
            <p class="tagline">Web Developer | Building High Performance Websites</p>
            
            <div class="stats-grid">
                <div class="stat-item"><span>1st Year</span><br>Student</div>
                <div class="stat-item"><span>6+</span><br>Projects</div>
                <div class="stat-item"><span style="color:#ffcc00">★ 4.9</span><br>Rating</div>
            </div>
        </div>

        <h2 class="section-title">Premium Services</h2>
        <div class="services-list">
            <div class="glass-card service-item" onclick="startPayment(200, '3D Website')">
                <span><i class="fas fa-cube"></i> 3D Website</span>
                <span class="price">₹200</span>
            </div>
            <div class="glass-card service-item" onclick="startPayment(200, 'E-commerce')">
                <span><i class="fas fa-shopping-cart"></i> E-commerce Store</span>
                <span class="price">₹200</span>
            </div>
            <div class="glass-card service-item" onclick="startPayment(100, 'Simple Brand')">
                <span><i class="fas fa-globe"></i> Simple Brand</span>
                <span class="price">₹100</span>
            </div>
        </div>

        <div class="glass-card booking-section">
            <h3>Book a Strategy Call 🤙🏻</h3>
            <p>24/7 For Premium Members</p>
            <button class="pay-btn" onclick="startPayment(20, '10 Min Call')">10 Min Call (₹20)</button>
        </div>
    </div>

    <a href="https://wa.me/917385009275" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="script.js"></script>
</body>
</html>
